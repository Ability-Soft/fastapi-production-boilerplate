name: 🐛 Bug Report
description: Report a bug to help us improve the boilerplate
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: 🔢 Reproduction Steps
      description: How can we reproduce the bug?
      placeholder: |
        1. Setup the project
        2. Run 'make ...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 📦 Version
      description: What version of the boilerplate are you using?
  - type: textarea
    id: logs
    attributes:
      label: 📋 Relevant log output
      description: Please copy and paste any relevant log output.
      render: shell
